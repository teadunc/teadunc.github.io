<!DOCTYPE html>
<html>
<head>
    <title>My Busy Day Schedule</title>

    <style>
        table {
            width: 70%;
            border-collapse: collapse;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }

        th {
            background-color: darkblue;
            color: white;
            padding: 12px;
            font-size: 20px;
        }

        td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }

        .important {
            background-color: lightyellow;
        }

        .time {
            background-color: lightblue;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: lightgray;
        }

        #title {
            text-align: center;
            font-family: Georgia, serif;
        }
    </style>

</head>

<body>

<h1 id="title">My Busy Day Schedule</h1>

<table>

    <tr>
        <th>Time</th>
        <th>Activity</th>
    </tr>

    <tr>
        <td class="time">7:00 AM</td>
        <td>Wake up and eat breakfast</td>
    </tr>

    <tr class="important">
        <td class="time">8:00 AM</td>
        <td>Go to school</td>
    </tr>

    <tr>
        <td class="time">12:00 PM</td>
        <td>Eat lunch</td>
    </tr>

    <tr>
        <td class="time">3:00 PM</td>
        <td>Finish classes and travel home</td>
    </tr>

    <tr class="important">
        <td class="time">4:00 PM</td>
        <td>Work on homework</td>
    </tr>

    <tr>
        <td class="time">6:00 PM</td>
        <td>Eat dinner with family</td>
    </tr>

    <tr>
        <td class="time">7:00 PM</td>
        <td>Practice bass guitar</td>
    </tr>

    <tr class="important">
        <td class="time">9:30 PM</td>
        <td>Relax and get ready for bed</td>
    </tr>

</table>

</body>
</html>
